/* ---------------- Seeded state from the seed spreadsheet ----------------
 * Each player started Q2 2026 with $10,000 USD. Spreadsheet provides buy
 * price and shares for each holding; cost basis = buy * shares.
 * cash = STARTING_CASH - sum(cost). Can be slightly negative for players
 * who over-allocated (data-entry rounding in the spreadsheet — operator to verify).
 * ----------------------------------------- */
function buildSeed() {
  const players = {
    p1: { id:'p1', name:'Player 1', short:'P1', emoji:'🦄', color:'#e91e63', cash:0, holdings:{} },
    p2: { id:'p2', name:'Player 2', short:'P2', emoji:'🐉', color:'#2196f3', cash:0, holdings:{} },

    p4: { id:'p4', name:'Player 4', short:'P4', emoji:'🌸', color:'#ff9800', cash:0, holdings:{} },
  };
  // Seed holdings: [playerId, ticker, buyPrice, shares]
  const seedTrades = [
    ['p1','SOL',     47.43,    18.553658],
    ['p1','TSLA',    364,      2.417582],
    ['p1','JPM',     308.11,   2.856123],
    ['p1','EL',      72.89,    12.072987],
    ['p1','COIN',    188.5,    4.668435],
    ['p1','BLSH',    39.75,    22.138365],
    ['p1','ETH',     2115.2,   0.416036],
    ['p1','BTC',     69352.91, 0.012689],
    ['p1','GOLD',    4778.9,   0.31388],
    ['p1','SOXL',    65.93,    23.228966],
    ['p2','SOLT',    8.43,     118.623962],
    ['p2','GOOGL',   312.5,    3.2],
    ['p2','NVDA',    188.24,   5.312367],
    ['p2','THX',     1.30,     769.230769],
    ['p2','JPM',     324.81,   3.078723],
    ['p2','GS',      894.74,   1.117643],
    ['p2','BTC',     95384.56, 0.010484],
    ['p2','AAL.L',   3047,     0.328192],
    ['p2','GOLD',    4411.7,   0.226670],
    ['p2','SILVER',  76.09,    13.142331],
    ['p3','DE',      594.18,   1.682992],
    ['p3','TTM',     413.4,    2.418965],
    ['p3','NVDA',    184.51,   5.419760],
    ['p3','CAT',     765,      1.307190],
    ['p3','SOXL',    66.51,    48.113066],
    ['p3','AMPX',    18,       177.777778],
    ['p4','DTR',     0.258,    3414.410223],
    ['p4','CCJ',     161.5,    5.454600],
    ['p4','SRL',     5.26,     167.474874],
    ['p4','FRS',     0.5,      1761.835675],
    ['p4','PSC',     0.183,    4813.758675],
    ['p4','PGDC',    0.565,    1559.146615],
    ['p4','GOLD',    4778.9,   0.31388],
    ['p4','SILVER',  66.51,    30.070666],
    ['p4','AMPX',    18,       111.111111],
  ];
  const trades = [];
  const startTs = QUARTER_START + 'T09:30:00Z';
  seedTrades.forEach(([pid, t, price, units], i) => {
    if (!ASSETS[t]) console.warn('Seed ticker not in universe:', t);
    const cost = price * units;
    if (!players[pid].holdings[t]) {
      players[pid].holdings[t] = { units:0, cost:0 };
    }
    players[pid].holdings[t].units += units;
    players[pid].holdings[t].cost  += cost;
    trades.push({
      id: `t_seed_${i}`,
      player_id: pid,
      ts: startTs,
      action: 'buy',
      ticker: t,
      units,
      price,
      value: cost,
      note: 'seeded'
    });
  });
  // Rescale any over-allocated player so total cost == STARTING_CASH (cash >= 0).
  // The source spreadsheet had rounding-driven over-allocations; we preserve each
  // player's relative weights but cap their total spend at $10,000.
  Object.values(players).forEach(p => {
    const totalCost = Object.values(p.holdings).reduce((s,h) => s + h.cost, 0);
    if (totalCost > STARTING_CASH) {
      const scale = STARTING_CASH / totalCost;
      Object.values(p.holdings).forEach(h => {
        h.units *= scale;
        h.cost  *= scale;
      });
      // Scale the matching seed trades so the chart's trade-replay stays consistent.
      trades.forEach(tr => {
        if (tr.player_id === p.id) {
          tr.units *= scale;
          tr.value *= scale;
        }
      });
    }
  });
  // Cash = STARTING_CASH - sum(cost). After the rescale this is guaranteed >= 0.
  Object.values(players).forEach(p => {
    const totalCost = Object.values(p.holdings).reduce((s,h) => s + h.cost, 0);
    p.cash = Math.max(0, STARTING_CASH - totalCost);
  });
  return {
    schema_version: SCHEMA_VERSION,
    game: { quarter:QUARTER_LABEL, start:QUARTER_START, end:QUARTER_END, currency:'USD', starting_cash:STARTING_CASH },
    players,
    order: ['p1','p2','p3','p4'],
    trades,
    created_at: nowISO(),
    last_modified: nowISO(),
  };
}

/* ---------------- Price Simulator ----------------
 * Each ticker has: cur (current), sessionOpen (start-of-session reference),
 * dayOpen (used for daily change), prevTickAt (timestamp).
 * On each tick we drift cur by a normal random walk with mean reversion
 * to dayOpen. ~30 random tickers updated per tick to feel "alive".
 * dailyChange % is computed against dayOpen.
 * ----------------------------------------- */
function initPrices() {
  const out = {};
  UNIVERSE.forEach(a => {
    // Give each name a mild starting daily change for first impression
    const startChgPct = (Math.random() - 0.5) * 4; // -2% to +2%
    const dayOpen = a.p / (1 + startChgPct/100);
    out[a.t] = {
      cur: a.p,
      dayOpen,
      sessionOpen: a.p,
      prevTickAt: Date.now(),
      lastTickDir: 0,
    };
  });
  return out;
}

// Override base prices for tickers that appear in the seeded portfolio,
// so initial P&L is exactly 0 at game start (matches the seed spreadsheet intent).
function applySeedToPrices(prices, seed) {
  Object.values(seed.players).forEach(p => {
    Object.entries(p.holdings).forEach(([t, h]) => {
      if (prices[t]) {
        // Pick the most-recent buy price for this ticker if multiple players hold it
        const tradesForT = seed.trades.filter(tr => tr.ticker === t);
        if (tradesForT.length) {
          const avgBuy = tradesForT.reduce((s,tr) => s + tr.price * tr.units, 0) /
                         tradesForT.reduce((s,tr) => s + tr.units, 0);
          // For first-load realism, set current = avg buy (P&L starts at 0 there)
          // and dayOpen slightly different so the dashboard has a non-zero daily change
          prices[t].cur = avgBuy;
          prices[t].sessionOpen = avgBuy;
          const startChgPct = (Math.random() - 0.5) * 4;
          prices[t].dayOpen = avgBuy / (1 + startChgPct/100);
        }
      }
    });
  });
  return prices;
}

// Tickers with a fresh live price (within LIVE_FRESH_MS) get a much milder
// drift — purely cosmetic so the dashboard tile flashes — but the price stays
// anchored to the live value. Stale tickers drift more freely.
const LIVE_FRESH_MS = 90_000;
function priceTick(prices) {
  const next = { ...prices };
  const tickers = Object.keys(next);
  const updateCount = Math.max(8, Math.floor(tickers.length * 0.18));
  const now = Date.now();
  for (let i = 0; i < updateCount; i++) {
    const t = tickers[Math.floor(Math.random() * tickers.length)];
    const p = next[t];
    if (!p) continue;
    const isLiveFresh = p.liveAt && (now - p.liveAt) < LIVE_FRESH_MS;
    // For live-fresh tickers: tiny cosmetic drift only (±0.05% sd, no mean reversion to a stale dayOpen)
    // For simulated tickers: full random walk + mean reversion
    const drift     = isLiveFresh ? randn() * 0.0005           : randn() * 0.0025;
    const reversion = isLiveFresh ? 0                          : (p.dayOpen - p.cur) / p.dayOpen * 0.02;
    const occasional= isLiveFresh ? 0                          : (Math.random() < 0.04 ? randn() * 0.005 : 0);
    const pctChange = drift + reversion + occasional;
    const newCur = Math.max(0.0001, p.cur * (1 + pctChange));
    next[t] = {
      ...p,
      cur: newCur,
      lastTickDir: newCur > p.cur ? 1 : (newCur < p.cur ? -1 : 0),
      prevTickAt: now,
    };
  }
  return next;
}

function dailyChangePct(p) {
  if (!p || !p.dayOpen) return 0;
  return (p.cur - p.dayOpen) / p.dayOpen * 100;
}

const PROXIES = [
  { name:'cors.lol',       build: u => `https://api.cors.lol/?url=${encodeURIComponent(u)}`,           parse:'json' },
  { name:'corsproxy',      build: u => `https://corsproxy.io/?${encodeURIComponent(u)}`,                parse:'json' },
  { name:'allorigins/raw', build: u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,   parse:'json' },
  { name:'allorigins/get', build: u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,   parse:'wrapped' },
  { name:'codetabs',       build: u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`, parse:'json' },
];
const PROXY_TIMEOUT_MS = 8000;
const BATCH_SIZE = 18;
const LIVE_REFRESH_MS = 60000;
const LIVE_STALE_MS = 180000;

const proxyHealth = Object.fromEntries(PROXIES.map(p => [p.name, { fails:0, benchedUntil:0 }]));
function markFail(name) {
  const h = proxyHealth[name]; if (!h) return;
  h.fails += 1;
  if (h.fails >= 3) { h.benchedUntil = Date.now() + 5*60*1000; h.fails = 0; }
}
function markOk(name) { const h = proxyHealth[name]; if (h) { h.fails = 0; h.benchedUntil = 0; } }
function healthyProxies() {
  const now = Date.now();
  return PROXIES.filter(p => (proxyHealth[p.name].benchedUntil || 0) <= now);
}

async function fetchWithTimeout(url, timeoutMs) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), timeoutMs);
  try { return await fetch(url, { signal: ctrl.signal }); }
  finally { clearTimeout(id); }
}

async function fetchBatchViaProxy(symbols, p) {
  const yahoo = `https://query1.finance.yahoo.com/v7/finance/spark?symbols=${symbols.map(encodeURIComponent).join(',')}&range=2d&interval=1d`;
  const r = await fetchWithTimeout(p.build(yahoo), PROXY_TIMEOUT_MS);
  if (!r.ok) { markFail(p.name); throw new Error(`HTTP ${r.status}`); }
  const raw = await r.text();
  if (/^Edge: Too Many|rate.*limit|cloudflare|Rate limit exceeded/i.test(raw.slice(0, 100))) {
    markFail(p.name); throw new Error('rate-limited');
  }
  let json;
  try {
    const parsed = JSON.parse(raw);
    json = p.parse === 'wrapped' ? JSON.parse(parsed.contents) : parsed;
  } catch (e) { markFail(p.name); throw e; }
  const result = json?.spark?.result;
  if (!Array.isArray(result)) { markFail(p.name); throw new Error('no spark.result'); }
  markOk(p.name);
  return result;
}

async function fetchBatchSpark(symbols) {
  if (!symbols.length) return {};
  const out = {};
  const proxies = healthyProxies().length ? healthyProxies() : [PROXIES[0]];
  for (const p of proxies) {
    try {
      const result = await fetchBatchViaProxy(symbols, p);
      for (const item of result) {
        const meta = item?.response?.[0]?.meta;
        const cur = meta?.regularMarketPrice;
        const prev = meta?.chartPreviousClose ?? meta?.previousClose;
        if (typeof cur === 'number') {
          out[item.symbol] = {
            cur,
            prev: (typeof prev === 'number' && prev > 0) ? prev : cur,
            currency: meta?.currency || 'USD',
          };
        }
      }
      return out; // first successful proxy wins
    } catch (e) {
      // try next proxy
    }
  }
  return out;
}

function priceToUSD(localPrice, currency, fxRates) {
  if (!Number.isFinite(localPrice)) return null;
  if (!currency || currency === 'USD' || currency === 'USd') return localPrice;
  if (currency === 'GBp') {
    const fx = fxRates['GBPUSD=X']?.cur;
    return fx ? (localPrice / 100) * fx : null;
  }
  if (currency === 'GBP') {
    const fx = fxRates['GBPUSD=X']?.cur;
    return fx ? localPrice * fx : null;
  }
  if (currency === 'AUD') {
    const fx = fxRates['AUDUSD=X']?.cur;
    return fx ? localPrice * fx : null;
  }
  if (currency === 'CAD') {
    const fx = fxRates['CADUSD=X']?.cur;
    return fx ? localPrice * fx : null;
  }
  if (currency === 'EUR') {
    const fx = fxRates['EURUSD=X']?.cur;
    return fx ? localPrice * fx : null;
  }
  if (currency === 'PLN') {
    const fx = fxRates['PLNUSD=X']?.cur;
    return fx ? localPrice * fx : null;
  }
  return localPrice; // unknown currency, return as-is
}

async function fetchAllLivePrices() {
  // Build the symbol list (FX rates first so they're already in cache when conversion runs)
  const fxSymbols = ['GBPUSD=X','AUDUSD=X','CADUSD=X','EURUSD=X','PLNUSD=X'];
  const tickerToYahoo = {};
  const yahooToTicker = {};
  for (const a of UNIVERSE) {
    const ys = YAHOO_SYMBOLS[a.t];
    if (ys) { tickerToYahoo[a.t] = ys; yahooToTicker[ys] = a.t; }
  }
  const stockSymbols = Object.values(tickerToYahoo);
  const allSymbols = [...fxSymbols, ...stockSymbols];

  // Batch
  const batches = [];
  for (let i = 0; i < allSymbols.length; i += BATCH_SIZE) batches.push(allSymbols.slice(i, i+BATCH_SIZE));

  // Run batches with small spacing to avoid rate limits
  const merged = {};
  for (let bi = 0; bi < batches.length; bi++) {
    const part = await fetchBatchSpark(batches[bi]);
    Object.assign(merged, part);
    if (bi < batches.length - 1) await new Promise(r => setTimeout(r, 150));
  }

  // Extract FX rates
  const fxRates = {};
  for (const s of fxSymbols) if (merged[s]) fxRates[s] = merged[s];

  // Build output keyed by internal ticker, with USD-converted prices
  const prices = {};
  let liveCount = 0;
  for (const [ys, p] of Object.entries(merged)) {
    if (fxSymbols.includes(ys)) continue; // FX rates handled separately
    const tk = yahooToTicker[ys];
    if (!tk) continue;
    const curUSD  = priceToUSD(p.cur,  p.currency, fxRates);
    const prevUSD = priceToUSD(p.prev, p.currency, fxRates);
    if (curUSD == null) continue;
    prices[tk] = { cur: curUSD, dayOpen: prevUSD ?? curUSD, currency: p.currency };
    liveCount++;
  }

  return { ok: liveCount > 0, prices, fxRates, count: liveCount, total: stockSymbols.length };
}

const HIST_CACHE = new Map(); // yahooSymbol -> [{date, close, currency}]

async function fetchHistoricalBatch(symbols, p) {
  const yahoo = `https://query1.finance.yahoo.com/v7/finance/spark?symbols=${symbols.map(encodeURIComponent).join(',')}&range=1mo&interval=1d`;
  const r = await fetchWithTimeout(p.build(yahoo), PROXY_TIMEOUT_MS);
  if (!r.ok) { markFail(p.name); throw new Error(`HTTP ${r.status}`); }
  const raw = await r.text();
  if (/^Edge: Too Many|rate.*limit|cloudflare|Rate limit exceeded/i.test(raw.slice(0, 100))) {
    markFail(p.name); throw new Error('rate-limited');
  }
  let json;
  try {
    const parsed = JSON.parse(raw);
    json = p.parse === 'wrapped' ? JSON.parse(parsed.contents) : parsed;
  } catch (e) { markFail(p.name); throw e; }
  const result = json?.spark?.result;
  if (!Array.isArray(result)) { markFail(p.name); throw new Error('no spark.result'); }
  markOk(p.name);
  return result;
}

async function fetchHistoricalBars(symbols) {
  const out = {};
  // Pull cache for symbols already fetched
  const misses = [];
  for (const s of symbols) {
    if (HIST_CACHE.has(s)) out[s] = HIST_CACHE.get(s);
    else misses.push(s);
  }
  if (misses.length === 0) return out;

  const batches = [];
  for (let i = 0; i < misses.length; i += BATCH_SIZE) batches.push(misses.slice(i, i+BATCH_SIZE));

  for (let bi = 0; bi < batches.length; bi++) {
    const batch = batches[bi];
    const proxies = healthyProxies().length ? healthyProxies() : [PROXIES[0]];
    let resolved = false;
    for (const p of proxies) {
      try {
        const result = await fetchHistoricalBatch(batch, p);
        for (const item of result) {
          const meta = item?.response?.[0]?.meta;
          const ts = item?.response?.[0]?.timestamp;
          const closes = item?.response?.[0]?.indicators?.quote?.[0]?.close;
          if (Array.isArray(ts) && Array.isArray(closes)) {
            const bars = ts.map((t, i) => ({
              date: new Date(t*1000).toISOString().slice(0,10),
              close: closes[i],
              currency: meta?.currency || 'USD',
            })).filter(b => b.close != null);
            if (bars.length > 0) {
              out[item.symbol] = bars;
              HIST_CACHE.set(item.symbol, bars);
            }
          }
        }
        resolved = true;
        break;
      } catch (e) { /* try next proxy */ }
    }
    if (!resolved) console.warn(`[FBC history] all proxies failed for batch ${bi+1}/${batches.length}`);
    if (bi < batches.length - 1) await new Promise(r => setTimeout(r, 200));
  }
  return out;
}

// Per-date FX lookup. fxBars maps Yahoo FX symbol → bars array.
function lookupFxOnDate(symbol, date, fxBars) {
  const bars = fxBars[symbol];
  if (!bars || bars.length === 0) return 1;
  for (let i = bars.length - 1; i >= 0; i--) {
    if (bars[i].date <= date) return bars[i].close;
  }
  return bars[0].close;
}

function priceToUSDOnDate(localPrice, currency, date, fxBars) {
  if (!Number.isFinite(localPrice)) return null;
  if (!currency || currency === 'USD' || currency === 'USd') return localPrice;
  let major = localPrice;
  if (currency === 'GBp') major = localPrice / 100;
  const fxSym = currency === 'GBp' || currency === 'GBP' ? 'GBPUSD=X'
              : currency === 'AUD' ? 'AUDUSD=X'
              : currency === 'CAD' ? 'CADUSD=X'
              : currency === 'EUR' ? 'EURUSD=X'
              : currency === 'PLN' ? 'PLNUSD=X'
              : null;
  if (!fxSym) return major;
  return major * lookupFxOnDate(fxSym, date, fxBars);
}

// Build a list of weekly checkpoint dates: quarter start (baseline) +
// every Friday between start and end + today (if within range and not already a Friday).
function weeklyCheckpoints(startISO, endISO) {
  const dates = [startISO];
  const start = new Date(startISO + 'T00:00:00Z');
  const end   = new Date(endISO   + 'T00:00:00Z');
  // Walk to first Friday at-or-after start (Friday = 5)
  const d = new Date(start);
  while (d.getUTCDay() !== 5) d.setUTCDate(d.getUTCDate() + 1);
  const today = new Date(todayISO() + 'T00:00:00Z');
  while (d <= end && d <= today) {
    const iso = d.toISOString().slice(0,10);
    if (iso !== startISO) dates.push(iso);
    d.setUTCDate(d.getUTCDate() + 7);
  }
  // Append today if it's within the quarter and not already in the list
  const todayISOStr = todayISO();
  if (todayISOStr >= startISO && todayISOStr <= endISO && !dates.includes(todayISOStr)) {
    dates.push(todayISOStr);
  }
  return dates;
}

// Replay each player's trades to build a weekly portfolio-value time series.
// First point is always $10,000 (the synthetic "everyone starts here" baseline).
// Subsequent points are end-of-week (Friday) closes; the final point is today
// using the latest live/cached prices.
function buildPortfolioHistory(state, histBars, livePrices) {
  const fxSyms = ['GBPUSD=X','AUDUSD=X','CADUSD=X','EURUSD=X','PLNUSD=X'];
  const fxBars = {};
  for (const s of fxSyms) if (histBars && histBars[s]) fxBars[s] = histBars[s];

  // Build close lookup: internal-ticker → { date: closeUSD }
  const closeMap = {};
  if (histBars) {
    for (const a of UNIVERSE) {
      const ys = YAHOO_SYMBOLS[a.t] || a.t;
      const bars = histBars[ys];
      if (!bars) continue;
      closeMap[a.t] = {};
      for (const b of bars) {
        const usd = priceToUSDOnDate(b.close, b.currency, b.date, fxBars);
        if (usd != null) closeMap[a.t][b.date] = usd;
      }
    }
  }

  // For a given date, return most recent close <= date (handles weekends + missing bars)
  function priceOn(ticker, date) {
    const m = closeMap[ticker];
    if (!m) return null;
    if (m[date] != null) return m[date];
    const allDates = Object.keys(m).sort();
    for (let i = allDates.length - 1; i >= 0; i--) {
      if (allDates[i] <= date) return m[allDates[i]];
    }
    return null;
  }

  const dates = weeklyCheckpoints(QUARTER_START, QUARTER_END);
  const todayISOStr = todayISO();
  const allTrades = [...state.trades].sort((a,b) => a.ts.localeCompare(b.ts));

  const series = {};
  for (const pid of state.order) {
    series[pid] = [];
    const playerTrades = allTrades.filter(t => t.player_id === pid);

    for (const date of dates) {
      let val;
      if (date === QUARTER_START) {
        // Synthetic baseline: everyone starts at $10,000 before any trades
        val = STARTING_CASH;
      } else {
        // Replay trades up to end-of-this-date, then value holdings at this date's close
        let cash = STARTING_CASH;
        const holdings = {};
        for (const t of playerTrades) {
          if (t.ts.slice(0,10) > date) break;
          if (t.action === 'buy') {
            cash -= t.value;
            if (!holdings[t.ticker]) holdings[t.ticker] = { units: 0, cost: 0 };
            holdings[t.ticker].units += t.units;
            holdings[t.ticker].cost  += t.value;
          } else {
            const h = holdings[t.ticker];
            if (h && h.units > 0) {
              const ratio = Math.min(1, t.units / h.units);
              h.cost  -= h.cost * ratio;
              h.units -= t.units;
              cash    += t.value;
            }
          }
        }
        val = cash;
        for (const [tk, h] of Object.entries(holdings)) {
          if (h.units < 1e-9) continue;
          // For TODAY, prefer the latest live price (most recent refresh)
          let px = null;
          if (date === todayISOStr && livePrices && livePrices[tk]?.cur) {
            px = livePrices[tk].cur;
          }
          if (px == null) px = priceOn(tk, date);
          if (px != null) {
            val += h.units * px;
          } else {
            val += h.cost; // no data — hold flat at cost basis
          }
        }
      }
      series[pid].push({ date, value: val });
    }
  }
  return { dates, series, fxBars };
}

/* ---------------- Portfolio math ---------------- */
function playerValue(player, prices) {
  const holdingsValue = Object.entries(player.holdings || {}).reduce((s, [t, h]) => {
    const px = prices[t]?.cur ?? 0;
    return s + h.units * px;
  }, 0);
  return (player.cash || 0) + holdingsValue;
}
function playerPL(player, prices) {
  return playerValue(player, prices) - STARTING_CASH;
}
function playerPLPct(player, prices) {
  return playerPL(player, prices) / STARTING_CASH * 100;
}

/* ---------- Bloomberg-style landing dashboard ---------- */
function timeSinceShort(ts) {
  if (!ts) return 'never';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

  // Index summary (synthetic from a basket)

    const avgChg = (tickers) => {
      const xs = tickers.map(t => dailyChangePct(prices[t])).filter(x => Number.isFinite(x));
      return xs.length ? xs.reduce((s,x)=>s+x,0) / xs.length : 0;

        </div>
        <div style={{display:'flex', gap:10, alignItems:'center'}}>
          <button
            onClick={onRefresh}
            disabled={fetchInFlight}
            style={{

              color: 'var(--term-amber)',
              border: '1px solid var(--term-amber)',
              fontFamily: 'var(--term-mono)', fontSize: 12, fontWeight: 700,

              borderRadius: 2,
            }}
          >{fetchInFlight ? '↻ FETCHING…' : '↻ REFRESH PRICES'}</button>
          <button className="fbc-d-play" onClick={onPlay}>▶ PLAY</button>
        </div>
      </div>
      <div style={{
        background: 'var(--term-panel)', borderBottom: '1px solid var(--term-border)',
        padding: '6px 16px', fontSize: 11, color: 'var(--term-dim)',
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}>
        <span>
          <span className={dataMode === 'live' ? 'live' : dataMode === 'stale' ? 'stale' : 'sim'} style={{color: dataMode==='live'?'var(--term-green)':dataMode==='stale'?'var(--term-red)':'var(--term-amber)'}}>
            ●
          </span>{' '}
          {lastFetchAt
            ? <>last refresh <span style={{color:'var(--term-text)'}}>{timeSinceShort(lastFetchAt)}</span> · {liveCount}/{liveTotal} tickers</>
            : <>no live data yet — tap REFRESH PRICES</>}
        </span>
        <span>animation off · prices update on refresh only</span>
      </div>

      {/* Index strip */}
      <div className="fbc-d-indexstrip">
        {indexSummary.map(idx => {
          const cls = idx.chg >= 0 ? 'up' : 'down';
          return (
            <div key={idx.name}>
              <span className="fbc-d-idx-name">{idx.name}</span>
              <span className="fbc-d-idx-val">{idx.name === 'BTC' ? fmtUSD0(idx.val) : idx.val.toFixed(2)}</span>
              <span className={`fbc-d-idx-chg ${cls}`}>{fmtPct(idx.chg, 2)}</span>
            </div>
          );
        })}
      </div>

      <div className="fbc-d-sec-title">Heatmap · Major Holdings</div>
      <div className="fbc-d-heatmap">
        {heatmapTickers.map(t => {
          const a = ASSETS[t]; if (!a) return null;
          const p = prices[t]; if (!p) return null;
          const chg = dailyChangePct(p);
          const flash = recentlyChanged[t];
          const tileClass = `fbc-d-tile ${chg>=0?'up':'down'} ${flash===1?'flash-up':flash===-1?'flash-down':''}`;
          return (
            <div key={t} className={tileClass}>

              <div className="fbc-d-tile-px">{p.cur < 1 ? p.cur.toFixed(4) : p.cur < 100 ? p.cur.toFixed(2) : p.cur < 10000 ? p.cur.toFixed(2) : Math.round(p.cur).toLocaleString()}</div>
              <div className={`fbc-d-tile-ch ${chg>=0?'up':'down'}`}>{fmtPct(chg, 2)}</div>
            </div>
          );
        })}
      </div>

      <div className="fbc-d-sec-title">Top Movers</div>
      <div className="fbc-d-movers">
        <div className="fbc-d-movers-col">
          <h4>▲ GAINERS</h4>
          {movers.gainers.map(m => (
            <div key={m.t} className="fbc-d-movers-row">
              <span className="tk">{m.t}</span>
              <span className="nm">{m.a?.n}</span>
              <span className="ch up">{fmtPct(m.chg, 2)}</span>
            </div>
          ))}
        </div>
        <div className="fbc-d-movers-col">
          <h4>▼ LOSERS</h4>
          {movers.losers.map(m => (
            <div key={m.t} className="fbc-d-movers-row">
              <span className="tk">{m.t}</span>
              <span className="nm">{m.a?.n}</span>
              <span className="ch down">{fmtPct(m.chg, 2)}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="fbc-d-tape">
        <div className="fbc-d-tape-track">
          {[...tapeItems, ...tapeItems].map((a, i) => {
            const p = prices[a.t];
            if (!p) return null;
            const chg = dailyChangePct(p);
            return (
              <span key={`${a.t}_${i}`} className="fbc-d-tape-item">
                <span className="tk">{a.t}</span>
                <span>{p.cur < 1 ? p.cur.toFixed(4) : p.cur < 100 ? p.cur.toFixed(2) : Math.round(p.cur).toLocaleString()}</span>
                <span className={`ch ${chg>=0?'up':'down'}`}>{fmtPct(chg, 2)}</span>
              </span>
            );
          })}
        </div>
      </div>

      <div className="fbc-d-status">
        Future Billionaires Club · {Object.keys(prices).length} symbols tracked · refresh manually to update
      </div>
    </div>
  );
}

/* ---------- Race chart (multi-line, one per player) ---------- */
function RaceChart({ state, history }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    if (!history || !history.dates || history.dates.length === 0) return;
    if (typeof Chart === 'undefined') {
      console.warn('[FBC chart] Chart.js not loaded — skipping render');
      return;
    }

    let labels, datasets;
    try {
      labels = history.dates;
      datasets = state.order.map(pid => {
      const p = state.players[pid];
      const data = history.series[pid].map(pt => Math.round(pt.value));
      return {
        label: `${p.emoji} ${p.name}`,
        data,
        borderColor: p.color,
        backgroundColor: p.color + '22',
        tension: 0.2,
        pointRadius: 0,
        pointHoverRadius: 4,
        borderWidth: 2.5,
        fill: false,
      };
    });

    } catch (e) {
      console.error('[FBC chart] dataset prep failed:', e);
      return;
    }

    try {
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        scales: {
          y: {
            ticks: {
              callback: (v) => '$' + Math.round(v).toLocaleString(),
              font: { size: 11 },
            },
            grid: { color: '#f0e9d8' },
          },
          x: {
            ticks: {
              maxTicksLimit: 7,
              font: { size: 10 },
              callback: function(value) {
                const lbl = this.getLabelForValue(value);
                if (!lbl) return lbl;
                const d = new Date(lbl + 'T00:00:00Z');
                return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
              },
            },
            grid: { display: false },
          },
        },
        plugins: {
          legend: {
            position: 'top',
            labels: { boxWidth: 14, font: { size: 12, weight: '700' }, padding: 10 },
          },
          tooltip: {
            callbacks: {
              title: (items) => {
                const lbl = items[0].label;
                const d = new Date(lbl + 'T00:00:00Z');
                return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
              },
              label: (ctx) => `${ctx.dataset.label}: $${ctx.raw.toLocaleString()}`,
            },
          },
          // $10,000 starting reference line via Chart.js annotation-style fake dataset
        },
      },
      plugins: [{
        id: 'startingLine',
        afterDraw: (chart) => {
          const yScale = chart.scales.y;
          const xScale = chart.scales.x;
          const y = yScale.getPixelForValue(STARTING_CASH);
          if (Number.isFinite(y) && y >= chart.chartArea.top && y <= chart.chartArea.bottom) {
            const ctx = chart.ctx;
            ctx.save();
            ctx.strokeStyle = '#9aa3b6';
            ctx.setLineDash([4, 4]);
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(xScale.left, y);
            ctx.lineTo(xScale.right, y);
            ctx.stroke();
            ctx.fillStyle = '#9aa3b6';
            ctx.font = '10px ui-sans-serif';
            ctx.fillText('$10,000 start', xScale.left + 4, y - 4);
            ctx.restore();
          }
        },
      }],
    });
    } catch (e) {
      console.error('[FBC chart] Chart.js init failed:', e);
    }

    return () => {
      if (chartRef.current) { try { chartRef.current.destroy(); } catch {} chartRef.current = null; }
    };
  }, [history, state]);

  if (!history) {
    return (
      <div style={{height: 100, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--game-soft)', fontSize:13}}>
        Loading historical prices… (Yahoo via CORS proxy)
      </div>
    );
  }
  if (history.error) {
    return (
      <div style={{padding:14, background:'#ffe9eb', borderRadius:10, color:'#dc2626', fontSize:12}}>
        Chart data error: {history.error}
      </div>
    );
  }
  if (!history.dates || history.dates.length === 0) {
    return (
      <div style={{padding:14, background:'#fff8e1', borderRadius:10, color:'#8d6e00', fontSize:12}}>
        Historical prices unavailable. CORS proxies didn't return bars — check Chrome DevTools console for `[FBC history]` log.
      </div>
    );
  }
  if (typeof Chart === 'undefined') {
    return (
      <div style={{padding:14, background:'#fff8e1', borderRadius:10, color:'#8d6e00', fontSize:12}}>
        Chart.js didn't load (offline or CDN blocked). Race chart unavailable; leaderboard below still works.
      </div>
    );
  }
  return (
    <div style={{height: 260, position:'relative'}}>
      <canvas ref={canvasRef} />
    </div>
  );
}

/* ---------- Trade modal (buy / sell sheet) ---------- */
function TradeSheet({ ticker, action, prices, player, onConfirm, onClose }) {
  const a = ASSETS[ticker];
  const p = prices[ticker];
  const px = p?.cur ?? 0;
  const chg = dailyChangePct(p);
  const blurb = BLURBS[ticker] || `${a.s} · ${a.n}`;
  const holding = player.holdings[ticker];
  const ownedUnits = holding?.units ?? 0;
  const ownedValue = ownedUnits * px;

  const [amount, setAmount] = useState('');
  const [error, setError] = useState('');
  const amountNum = parseFloat(amount) || 0;

  function quickSet(v) {
    if (action === 'buy') {
      const cap = Math.max(0, player.cash);
      const presets = [
        Math.min(50,  Math.floor(cap)),
        Math.min(100, Math.floor(cap)),
        Math.min(250, Math.floor(cap)),
        Math.floor(cap),
      ];
      setAmount(String(presets[v]));
    } else {
      // sell: amount in USD
      const presets = [
        Math.floor(ownedValue * 0.25),
        Math.floor(ownedValue * 0.5),
        Math.floor(ownedValue * 0.75),
        Math.floor(ownedValue),
      ];
      setAmount(String(presets[v]));
    }
  }

  function handleConfirm() {
    setError('');
    if (amountNum <= 0) { setError('Enter an amount.'); return; }
    if (action === 'buy') {
      if (amountNum > player.cash + 0.01) { setError(`You only have ${fmtUSD(player.cash, 2)} in cash.`); return; }
      const units = amountNum / px;
      onConfirm({ action:'buy', ticker, units, price: px, value: amountNum });
    } else {
      if (amountNum > ownedValue + 0.01) { setError(`You only own ${fmtUSD(ownedValue, 2)} of ${ticker}.`); return; }
      const units = amountNum / px;
      onConfirm({ action:'sell', ticker, units, price: px, value: amountNum });
    }
  }

  return (
    <div className="fbc-g-trade-modal" onClick={onClose}>
      <div className="fbc-g-trade-sheet" onClick={e => e.stopPropagation()}>
        <button className="fbc-g-trade-close" onClick={onClose}>✕</button>
        <div style={{fontSize:32}}>{a.e}</div>
        <div className="fbc-g-trade-tk">{a.t}</div>
        <div className="fbc-g-trade-nm">{a.n} · {a.s}</div>
        <div className="fbc-g-trade-px">{px < 1 ? fmtUSD(px, 4) : fmtUSD(px, 2)}</div>
        <div className={`fbc-g-trade-ch ${chg >= 0 ? 'up' : 'down'}`}>{fmtPct(chg, 2)} today</div>
        <div className="fbc-g-trade-blurb">{blurb}</div>

        {ownedUnits > 0 && (
          <div style={{marginBottom:12, fontSize:13, color:'var(--game-soft)'}}>
            You own {fmtUnits(ownedUnits)} units · {fmtUSD(ownedValue, 2)} · cost basis {fmtUSD((holding?.cost||0), 2)}
          </div>
        )}

        <div style={{fontSize:13, fontWeight:700, marginBottom:6}}>
          {action === 'buy' ? 'How much $ do you want to buy?' : 'How much $ do you want to sell?'}
        </div>
        <input
          className="fbc-g-amount-input"
          type="number"
          min="0"
          step="1"
          inputMode="decimal"
          placeholder="$"
          value={amount}
          onChange={e => setAmount(e.target.value)}
        />
        <div className="fbc-g-quick-amts">
          {[0,1,2,3].map(i => <button key={i} onClick={() => quickSet(i)}>
            {action === 'buy'
              ? (i===0?'$50':i===1?'$100':i===2?'$250':'MAX')
              : (i===0?'25%':i===1?'50%':i===2?'75%':'ALL')}
          </button>)}
        </div>
        <div style={{fontSize:12, color:'var(--game-soft)', marginBottom:10}}>
          {action === 'buy'
            ? `Cash available: ${fmtUSD(player.cash, 2)}`
            : `Holding value: ${fmtUSD(ownedValue, 2)}`}
        </div>
        {amountNum > 0 && (
          <div style={{fontSize:13, marginBottom:10, padding:10, background:'#faf6ec', borderRadius:10}}>
            That's <b>{fmtUnits(amountNum / px)}</b> units at {fmtUSD(px, 2)}
          </div>
        )}

        {action === 'buy' && amountNum > player.cash + 0.01 && (
          <div className="fbc-g-warn">
            💡 Not enough cash. You have <b>{fmtUSD(player.cash, 2)}</b>{player.cash <= 0 ? '. Sell something you own first to free up cash.' : `. Try a smaller amount, or sell something to free up more cash.`}
          </div>
        )}
        {action === 'sell' && amountNum > ownedValue + 0.01 && (
          <div className="fbc-g-warn">
            💡 You only own <b>{fmtUSD(ownedValue, 2)}</b> of {ticker}. Try a smaller amount.
          </div>
        )}

        <button
          className={`fbc-g-action-btn ${action === 'sell' ? 'sell' : ''}`}
          disabled={
            !amountNum ||
            (action === 'buy'  && amountNum > player.cash + 0.01) ||
            (action === 'sell' && amountNum > ownedValue + 0.01)
          }
          onClick={handleConfirm}
        >
          {action === 'buy' ? 'BUY' : 'SELL'} {ticker}
        </button>
        {error && <div className="fbc-g-error">{error}</div>}
      </div>
    </div>
  );
}

/* ---------- Game container ---------- */
function Game({ state, setState, prices, onBack, onSave, onLoad, dataMode, lastFetchAt, liveCount, liveTotal, onRefresh, fetchInFlight, history }) {
  const [currentPid, setCurrentPid] = useState(null);
  const [tab, setTab] = useState('home');     // home | trade | portfolio | history
  const [tradeTicker, setTradeTicker] = useState(null);
  const [tradeAction, setTradeAction] = useState('buy');

  const player = currentPid ? state.players[currentPid] : null;

  function pickPlayer(pid) {
    setCurrentPid(pid);
    setTab('home');
  }

  function renamePlayer(pid) {
    const current = state.players[pid]?.name || '';
    const entered = (typeof window !== 'undefined' && window.prompt)
      ? window.prompt(`Rename "${current}":`, current)
      : null;
    if (entered == null) return;
    const trimmed = entered.trim().slice(0, 24);
    if (!trimmed || trimmed === current) return;
    setState(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      if (!next.players[pid]) return prev;
      next.players[pid].name = trimmed;
      next.players[pid].short = trimmed.slice(0, 8);
      next.last_modified = nowISO();
      saveLocal(next);
      return next;
    });
  }

  function openTrade(ticker, action) {
    setTradeTicker(ticker);
    setTradeAction(action);
  }

  function executeTrade({ action, ticker, units, price, value }) {
    setState(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const p = next.players[currentPid];
      if (action === 'buy') {
        // Defensive: refuse buys that would push cash negative (e.g. price moved
        // between input and confirm). The TradeSheet already blocks the button.
        if (value > p.cash + 0.01) return prev;
        p.cash -= value;
        if (!p.holdings[ticker]) p.holdings[ticker] = { units:0, cost:0 };
        p.holdings[ticker].units += units;
        p.holdings[ticker].cost  += value;
      } else {
        // sell
        const h = p.holdings[ticker];
        if (!h) return prev;
        const sellRatio = units / h.units;
        const costRemoved = h.cost * sellRatio;
        h.units -= units;
        h.cost  -= costRemoved;
        p.cash  += value;
        if (h.units < 1e-9) delete p.holdings[ticker];
      }
      next.trades.push({
        id: uid('t'),
        player_id: currentPid,
        ts: nowISO(),
        action, ticker, units, price, value,
      });
      next.last_modified = nowISO();
      saveLocal(next);
      return next;
    });
    setTradeTicker(null);
  }

  // No player picked yet → show home/leaderboard
  if (!currentPid) {
    return (
      <div className="fbc-game">
        <GameHeader title="FUTURE BILLIONAIRES CLUB" onBack={onBack} onSave={onSave} onLoad={onLoad} dataMode={dataMode} lastFetchAt={lastFetchAt} onRefresh={onRefresh} />
        <div className="fbc-g-body">
          <PlayerSelect
            state={state} prices={prices} onPickPlayer={pickPlayer} onRenamePlayer={renamePlayer} history={history}
            lastFetchAt={lastFetchAt} dataMode={dataMode}
            liveCount={liveCount} liveTotal={liveTotal}
            onRefresh={onRefresh} fetchInFlight={fetchInFlight}
          />
        </div>
      </div>
    );
  }

  return (
    <div className="fbc-game">
      <GameHeader
        title={`${player.emoji} ${player.name}`}
        onBack={() => setCurrentPid(null)}
        onSave={onSave}
        onLoad={onLoad}
        dataMode={dataMode}
        lastFetchAt={lastFetchAt}
        onRefresh={onRefresh}
      />
      <div className="fbc-g-body">
        <div className="fbc-g-tabs">
          {[
            ['home','🏆 Home'],
            ['trade','💸 Trade'],
            ['portfolio','📊 Portfolio'],
            ['history','📜 History'],
          ].map(([id, label]) => (
            <button key={id} className={`fbc-g-tab ${tab===id?'active':''}`} onClick={() => setTab(id)}>{label}</button>
          ))}
        </div>

        {tab === 'home' && (
          <PlayerSelect
            state={state} prices={prices} onPickPlayer={pickPlayer} onRenamePlayer={renamePlayer} history={history}
            lastFetchAt={lastFetchAt} dataMode={dataMode}
            liveCount={liveCount} liveTotal={liveTotal}
            onRefresh={onRefresh} fetchInFlight={fetchInFlight}
          />
        )}
        {tab === 'trade' && (
          <AssetBrowser prices={prices} onPick={(t) => openTrade(t, 'buy')} />
        )}
        {tab === 'portfolio' && (
          <PortfolioView player={player} prices={prices} onSell={(t) => openTrade(t, 'sell')} />
        )}
        {tab === 'history' && (
          <HistoryView trades={state.trades} currentPid={currentPid} />
        )}
      </div>

      {tradeTicker && (
        <TradeSheet
          ticker={tradeTicker}
          action={tradeAction}
          prices={prices}
          player={player}
          onConfirm={executeTrade}
          onClose={() => setTradeTicker(null)}
        />
      )}
    </div>
  );
}

/* ---------- Error boundary — surfaces render-time crashes instead of a blank page ---------- */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null, info: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) {
    this.setState({ error, info });
    console.error('[FBC ErrorBoundary]', error, info);
    if (typeof window !== 'undefined') window.__FBC_LAST_ERROR__ = { error, info, ts: Date.now() };
  }
  render() {
    if (this.state.error) {
      return React.createElement('div', {
        style: { padding: '24px', fontFamily: 'ui-sans-serif, system-ui', maxWidth: 720, margin: '40px auto' }
      },
        React.createElement('h2', { style: { color: '#dc2626' } }, '⚠ App crashed'),
        React.createElement('p', { style: { color: '#444', fontSize: 14 } }, 'A render-time error stopped the app. Details below — if you reload and it still fails, share this with Otto.'),
        React.createElement('pre', {
          style: { background: '#fff5f5', padding: 12, borderRadius: 8, fontSize: 12, overflow: 'auto', whiteSpace: 'pre-wrap' }
        }, String(this.state.error?.stack || this.state.error)),
        React.createElement('button', {
          onClick: () => { localStorage.removeItem(LS_KEY); location.reload(); },
          style: { padding: '10px 16px', background: '#dc2626', color: 'white', border: 'none', borderRadius: 8, fontWeight: 700, cursor: 'pointer' }
        }, 'Clear save & reload')
      );
    }
    return this.props.children;
  }
}

/* ---------- Root App ----------
 * v1.4 redesign:
 *   - No automatic price simulator
 *   - No automatic live-price interval
 *   - Prices + historical bars persist to localStorage between sessions
 *   - Manual REFRESH button is the only trigger for new data
 *   - On first ever load (no cached prices), one auto-fetch kicks off so the
 *     user has something to look at; after that everything is manual.
 * ---------------------------------------------------------------------- */
function App() {
  const [route, setRoute] = useState('dashboard');
  const [state, setState] = useState(() => loadLocal() || SEED);

  // Restore prices from cache, falling back to seeded buy-price baselines.
  const [prices, setPrices] = useState(() => {
    const cached = loadPricesLocal();
    if (cached?.prices) return cached.prices;
    return applySeedToPrices(initPrices(), state);
  });
  const [lastFetchAt, setLastFetchAt] = useState(() => loadPricesLocal()?.fetchedAt || null);
  const [liveCount, setLiveCount] = useState(0);
  const [liveTotal, setLiveTotal] = useState(0);
  const [dataMode, setDataMode] = useState(() => loadPricesLocal() ? 'live' : 'sim');
  const [fetchInFlight, setFetchInFlight] = useState(false);
  const [historicalBars, setHistoricalBars] = useState(() => loadHistLocal()?.bars || null);
  const [recentlyChanged, setRecentlyChanged] = useState({});
  const fileInputRef = useRef(null);

  const history = useMemo(() => {
    try {
      return buildPortfolioHistory(state, historicalBars || {}, prices);
    } catch (e) {
      console.error('[FBC history] buildPortfolioHistory threw:', e);
      return { dates: [], series: {}, error: e.message };
    }
  }, [historicalBars, state, prices]);

  // Auto-save game state on every change
  useEffect(() => { saveLocal(state); }, [state]);

  // Expose for DevTools inspection
  useEffect(() => {
    if (typeof window !== 'undefined') {
      window.__FBC_PRICES__ = prices;
      window.__FBC_STATE__ = state;
      window.__FBC_HISTORY__ = history;
    }
  }, [prices, state, history]);

  // The unified refresh: fetches live prices AND historical bars, persists both.
  async function handleRefreshNow() {
    if (fetchInFlight) return;
    setFetchInFlight(true);
    try {
      const universeYahoo = Object.values(YAHOO_SYMBOLS);
      const fxSyms = ['GBPUSD=X','AUDUSD=X','CADUSD=X','EURUSD=X','PLNUSD=X'];
      const allHistSyms = [...new Set([...universeYahoo, ...fxSyms])];

      // Run live + historical fetches in parallel
      const [liveResult, histBars] = await Promise.all([
        fetchAllLivePrices(),
        fetchHistoricalBars(allHistSyms),
      ]);

      const now = Date.now();
      let newPrices = null;

      if (liveResult.ok) {
        setLastFetchAt(now);
        setLiveCount(liveResult.count);
        setLiveTotal(liveResult.total);
        setDataMode('live');

        setPrices(prev => {
          const next = { ...prev };
          const changed = {};
          for (const [tk, p] of Object.entries(liveResult.prices)) {
            if (!next[tk]) continue;
            const oldCur = next[tk].cur || 0;
            const dir = p.cur > oldCur ? 1 : (p.cur < oldCur ? -1 : 0);
            next[tk] = {
              ...next[tk],
              cur: p.cur, dayOpen: p.dayOpen,
              prevTickAt: now, liveAt: now, lastTickDir: dir,
            };
            if (dir !== 0) changed[tk] = dir;
          }
          newPrices = next;
          savePricesLocal(next, now);
          setRecentlyChanged(changed);
          setTimeout(() => setRecentlyChanged({}), 1500);
          return next;
        });

        const got = Object.keys(liveResult.prices);
        console.log(`[FBC live] ${liveResult.count}/${liveResult.total} tickers updated.`);
        const missing = Object.keys(YAHOO_SYMBOLS).filter(t => !got.includes(t));
        if (missing.length) console.log(`[FBC live] MISSING (${missing.length}):`, missing.join(', '));
        if (typeof window !== 'undefined') window.__FBC_LAST_FETCH__ = { at: now, ...liveResult };
      } else {
        console.warn('[FBC live] all proxies failed');
      }

      const histGot = Object.keys(histBars).length;
      console.log(`[FBC history] ${histGot}/${allHistSyms.length} symbols got historical bars`);
      if (histGot > 0) {
        setHistoricalBars(histBars);
        saveHistLocal(histBars, now);
      }
    } catch (e) {
      console.warn('[FBC refresh] failed:', e);
    } finally {
      setFetchInFlight(false);
    }
  }

  // First-load auto-fetch ONCE if we have nothing cached.
  useEffect(() => {
    const cachedPrices = loadPricesLocal();
    const cachedHist   = loadHistLocal();
    if (!cachedPrices || !cachedHist) {
      handleRefreshNow();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  function handleSave() {
    exportToFile(state);
  }
  function handleLoadClick() {
    fileInputRef.current?.click();
  }
  async function handleFileChosen(e) {
    const f = e.target.files?.[0];
    if (!f) return;
    try {
      const loaded = await importFromFile(f);
      setState(loaded);
      saveLocal(loaded);
      alert('Game loaded.');
    } catch (err) {
      alert('Could not load: ' + err.message);
    }
    e.target.value = '';
  }
  function handleReset() {
    if (confirm('Reset back to the starting Q2 2026 portfolio? Auto-save your file first if you want to keep current state.')) {
      setState(SEED);
      saveLocal(SEED);
    }
  }

  return (
    <div>
      <input ref={fileInputRef} type="file" accept="application/json" style={{display:'none'}} onChange={handleFileChosen} />
      {route === 'dashboard' && (
        <Dashboard
          prices={prices}
          recentlyChanged={recentlyChanged}
          onPlay={() => setRoute('game')}
          dataMode={dataMode}
          lastFetchAt={lastFetchAt}
          liveCount={liveCount}
          liveTotal={liveTotal}
          onRefresh={handleRefreshNow}
          fetchInFlight={fetchInFlight}
        />
      )}
      {route === 'game' && (
        <Game
          state={state}
          setState={setState}
          prices={prices}
          dataMode={dataMode}
          lastFetchAt={lastFetchAt}
          liveCount={liveCount}
          liveTotal={liveTotal}
          onBack={() => setRoute('dashboard')}
          onSave={handleSave}
          onLoad={handleLoadClick}
          onRefresh={handleRefreshNow}
          fetchInFlight={fetchInFlight}
          history={history}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
